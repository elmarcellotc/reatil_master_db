services:
  masterdb:
    container_name: RetailMasterDB
    build:
      context: .
      args:
        MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
        MYSQL_ETL_PASSWORD: "${MYSQL_ETL_PASSWORD}"
        MYSQL_ANALYST_PASSWORD: "${MYSQL_ANALYST_PASSWORD}"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_ETL_PASSWORD: "${MYSQL_ETL_PASSWORD}"
      MYSQL_ANALYST_PASSWORD: "${MYSQL_ANALYST_PASSWORD}"
    ports:
      - "3306:3306"
    volumes:
      - ./init-db:/init-db
      - ./scripts:/scripts
      - ./data:/var/lib/mysql
    entrypoint: ["/bin/bash", "/scripts/init.sh"]
    stdin_open: true
    tty: true
    networks:
      - retailnet

  retailetl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retailetl
    volumes:
      - .:/app
    environment:
      MYSQL_ETL_PASSWORD: "${MYSQL_ETL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_ANALYST_PASSWORD: "${MYSQL_ANALYST_PASSWORD}"
    networks:
      - retailnet
    depends_on:
      - masterdb

networks:
  retailnet:
    driver: bridge